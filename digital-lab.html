<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio Digital - De Morgan y Puertas Universales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/x-mathjax-config">
        MathJax.Hub.Config({
            tex2jax: {inlineMath: [['$','$'], ['\\(','\\)']]},
            "HTML-CSS": { linebreaks: { automatic: true } }
        });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-MML-AM_CHTML"></script>
    <style>
        .kmap-cell {
            width: 45px;
            height: 45px;
            background: white;
            border: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            font-weight: bold;
            font-size: 0.8rem;
        }
        .kmap-cell.active { background-color: #dcfce7; color: #166534; border: 2px solid #22c55e; }
        .kmap-label { font-size: 7px; color: #94a3b8; position: absolute; bottom: 1px; right: 2px; font-family: monospace; }
        .ansi-gate { fill: #fff; stroke: #000; stroke-width: 2.5; }
        .wire { fill: none; stroke-width: 2; stroke-linecap: round; }
        .wire-dot { fill: #334155; }
        .btn-tab { transition: all 0.3s ease; }
        .btn-tab.active { background-color: #1e293b; color: white; border-color: #1e293b; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans">
    <div class="max-w-7xl mx-auto p-4 md:p-6 space-y-6">
        
        <header class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 flex flex-wrap items-center justify-between">
            <div>
                <h1 class="text-2xl font-black text-slate-800 tracking-tighter uppercase">Digital Lab <span class="text-blue-600">Pro</span></h1>
                <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Corrección de Leyes de De Morgan y Ruteado de Cables</p>
            </div>
            <div class="flex gap-4">
                <select id="inputCount" class="bg-slate-50 border-2 border-slate-200 px-4 py-2 rounded-2xl font-bold text-slate-700 outline-none hover:border-blue-300 transition-colors">
                    <option value="2">2 Entradas</option>
                    <option value="3">3 Entradas</option>
                    <option value="4" selected>4 Entradas</option>
                </select>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="bg-slate-800 p-3 text-white text-[10px] font-black uppercase tracking-widest text-center">Tabla de Verdad</div>
                    <div class="overflow-y-auto max-h-[350px]">
                        <table class="w-full text-center">
                            <thead id="truthTableHead" class="bg-slate-50 text-[9px] uppercase font-black text-slate-400 border-b"></thead>
                            <tbody id="truthTableBody" class="text-xs font-mono text-slate-600"></tbody>
                        </table>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <h2 class="text-[10px] font-black uppercase text-slate-400 mb-4 tracking-widest text-center">Mapa de Karnaugh</h2>
                    <div id="kmapContainer" class="flex justify-center"></div>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <div class="bg-slate-900 rounded-3xl p-8 shadow-2xl border border-slate-800">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <label class="text-[10px] font-black text-blue-400 uppercase mb-3 block tracking-widest">Función Mínima (SOP)</label>
                            <div id="latexFormula" class="text-white text-xl min-h-[60px] flex items-center"></div>
                        </div>
                        <div class="md:border-l border-slate-700 md:pl-8">
                            <label class="text-[10px] font-black text-amber-400 uppercase mb-3 block tracking-widest">Transformación Universal</label>
                            <div id="morganFormula" class="text-slate-300 text-sm min-h-[60px] flex items-center italic"></div>
                        </div>
                    </div>
                </div>

                <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                    <div class="flex flex-wrap items-center justify-between mb-8 gap-4">
                        <h2 class="text-xs font-black uppercase text-slate-400 tracking-widest">Esquema Lógico (Entradas diferenciadas)</h2>
                        <div class="flex p-1.5 bg-slate-100 rounded-2xl border border-slate-200 shadow-inner" id="gateTabs">
                            <button onclick="changeGateType('standard')" class="btn-tab active px-5 py-2.5 rounded-xl text-xs font-black uppercase">AND/OR</button>
                            <button onclick="changeGateType('nand')" class="btn-tab px-5 py-2.5 rounded-xl text-xs font-black uppercase">NAND-NAND</button>
                            <button onclick="changeGateType('nor')" class="btn-tab px-5 py-2.5 rounded-xl text-xs font-black uppercase">NOR-NOR</button>
                        </div>
                    </div>
                    
                    <div class="bg-slate-50 rounded-3xl border border-slate-100 p-6 flex justify-center overflow-x-auto shadow-inner">
                        <svg id="circuitSvg" width="750" height="500" viewBox="0 0 750 500"></svg>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let inputs = 4;
        let truthData = {};
        let currentGateType = 'standard';
        
        const busColors = ['#3b82f6', '#ef4444', '#10b981', '#f59e0b'];
        const internalWireColor = '#64748b';

        const grayIndices = {
            2: { rows: [0, 1], cols: [0, 1], rL: 'A', cL: 'B' },
            3: { rows: [0, 1], cols: [0, 1, 3, 2], rL: 'A', cL: 'BC' },
            4: { rows: [0, 1, 3, 2], cols: [0, 1, 3, 2], rL: 'AB', cL: 'CD' }
        };

        function init() {
            inputs = parseInt(document.getElementById('inputCount').value);
            truthData = {};
            renderTable();
            updateAnalysis();
        }

        document.getElementById('inputCount').addEventListener('change', init);

        function changeGateType(type) {
            currentGateType = type;
            document.querySelectorAll('.btn-tab').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            updateAnalysis();
        }

        function renderTable() {
            const letters = ['A', 'B', 'C', 'D'].slice(0, inputs);
            let headHtml = `<tr>`;
            letters.forEach(l => headHtml += `<th class="p-2 border-x">${l}</th>`);
            headHtml += `<th class="p-2 bg-blue-50 text-blue-600 font-black">F</th></tr>`;
            document.getElementById('truthTableHead').innerHTML = headHtml;

            let bodyHtml = '';
            for(let i=0; i<Math.pow(2, inputs); i++) {
                const bin = i.toString(2).padStart(inputs, '0');
                if(truthData[i] === undefined) truthData[i] = 0;
                bodyHtml += `<tr class="border-b hover:bg-slate-50">`;
                bin.split('').forEach(b => bodyHtml += `<td class="p-1 border-x text-slate-400">${b}</td>`);
                bodyHtml += `<td class="p-1">
                    <button onclick="toggleBit(${i})" class="w-6 h-6 rounded-lg transition-all ${truthData[i] ? 'bg-blue-600 text-white shadow-md':'bg-slate-200 text-slate-500'} font-bold text-[10px]">
                        ${truthData[i]}
                    </button>
                </td></tr>`;
            }
            document.getElementById('truthTableBody').innerHTML = bodyHtml;
        }

        function toggleBit(i) {
            truthData[i] = truthData[i] === 0 ? 1 : 0;
            renderTable();
            updateAnalysis();
        }

        function updateAnalysis() {
            renderKMap();
            const minified = solveQuineMcCluskey();
            displayFormulas(minified);
            drawCircuit(minified);
        }

        function renderKMap() {
            const container = document.getElementById('kmapContainer');
            const setup = grayIndices[inputs];
            let html = `<div class="inline-block bg-white p-2 border border-slate-100 shadow-sm rounded-xl">`;
            html += `<div class="flex items-center"><div class="w-10 h-10 flex items-center justify-center font-black text-slate-800 text-[9px]">${setup.rL}\\${setup.cL}</div>`;
            setup.cols.forEach(c => html += `<div class="w-10 text-center font-black text-slate-400 text-[10px]">${c.toString(2).padStart(setup.cL.length, '0')}</div>`);
            html += `</div>`;
            setup.rows.forEach(r => {
                const rLabel = r.toString(2).padStart(setup.rL.length, '0');
                html += `<div class="flex items-center"><div class="w-10 h-10 flex items-center justify-end pr-2 font-black text-slate-400 text-[10px]">${rLabel}</div>`;
                setup.cols.forEach(c => {
                    const idx = parseInt(rLabel + c.toString(2).padStart(setup.cL.length, '0'), 2);
                    const val = truthData[idx] || 0;
                    html += `<div onclick="toggleBit(${idx})" class="kmap-cell ${val?'active':''}">
                                ${val} <span class="kmap-label">${idx}</span>
                             </div>`;
                });
                html += `</div>`;
            });
            html += `</div>`;
            container.innerHTML = html;
        }

        function solveQuineMcCluskey() {
            const minterms = Object.keys(truthData).filter(k => truthData[k] === 1).map(Number);
            if (minterms.length === 0) return "0";
            if (minterms.length === Math.pow(2, inputs)) return "1";

            let groups = {};
            minterms.forEach(m => {
                const ones = m.toString(2).split('1').length - 1;
                if(!groups[ones]) groups[ones] = [];
                groups[ones].push({ mask: m, dash: 0, combined: false });
            });

            let primeImplicants = [];
            let currentGroups = groups;
            while (Object.keys(currentGroups).length > 0) {
                let nextGroups = {};
                let keys = Object.keys(currentGroups).map(Number).sort((a,b)=>a-b);
                let merged = false;
                for (let i=0; i<keys.length-1; i++) {
                    currentGroups[keys[i]].forEach(t1 => {
                        currentGroups[keys[i+1]].forEach(t2 => {
                            if (t1.dash === t2.dash) {
                                let diff = t1.mask ^ t2.mask;
                                if ((diff & (diff-1)) === 0) {
                                    t1.combined = t2.combined = merged = true;
                                    let c = { mask: t1.mask & t2.mask, dash: t1.dash | diff, combined: false };
                                    if (!nextGroups[keys[i]]) nextGroups[keys[i]] = [];
                                    if (!nextGroups[keys[i]].some(g => g.mask === c.mask && g.dash === c.dash)) nextGroups[keys[i]].push(c);
                                }
                            }
                        });
                    });
                }
                for (let k in currentGroups) currentGroups[k].forEach(t => { if(!t.combined) primeImplicants.push(t); });
                if (!merged) break;
                currentGroups = nextGroups;
            }
            return primeImplicants;
        }

        function displayFormulas(implicants) {
            const elNormal = document.getElementById('latexFormula');
            const elMorgan = document.getElementById('morganFormula');
            if (typeof implicants === "string") {
                elNormal.innerHTML = `$$ F = ${implicants} $$`;
                elMorgan.innerHTML = "No requiere simplificación.";
            } else {
                const letters = ['A', 'B', 'C', 'D'];
                const terms = implicants.map(imp => {
                    let p = [];
                    for (let i=0; i<inputs; i++) {
                        let bitPos = inputs-1-i;
                        if (!((imp.dash >> bitPos) & 1)) {
                            p.push(((imp.mask >> bitPos) & 1) ? letters[i] : `\\overline{${letters[i]}}`);
                        }
                    }
                    return p.join(' \\cdot ');
                });
                elNormal.innerHTML = `$$ F = ${terms.join(' + ')} $$`;
                
                if (currentGateType === 'nand') {
                    const nandString = terms.map(t => `\\overline{${t}}`).join(' \\cdot ');
                    elMorgan.innerHTML = `$$ F = \\overline{\\sum \\overline{T_i}} = \\overline{ ${nandString} } $$`;
                } else if (currentGateType === 'nor') {
                    elMorgan.innerHTML = `$$ F = \\overline{\\prod \\overline{T_i}} $$`;
                } else {
                    elMorgan.innerHTML = "Implementación directa AND-OR.";
                }
            }
            if(window.MathJax) MathJax.Hub.Queue(["Typeset", MathJax.Hub]);
        }

        function drawCircuit(implicants) {
            const svg = document.getElementById('circuitSvg');
            svg.innerHTML = '';
            if (typeof implicants === "string") return;

            const startX = 60, gateX = 300, outX = 580;
            const letters = ['A', 'B', 'C', 'D'].slice(0, inputs);

            // Buses de entrada
            letters.forEach((l, i) => {
                const x = startX + (i * 40);
                drawLine(svg, x, 30, x, 470, busColors[i]);
                drawText(svg, x-5, 25, l, 14, busColors[i]);
            });

            implicants.forEach((imp, idx) => {
                if(idx > 7) return;
                const gateY = 60 + (idx * 55);
                const gateH = 35;
                
                // Recolectar entradas activas para este implicante
                let activeInputs = [];
                for (let i=0; i<inputs; i++) {
                    let bitPos = inputs-1-i;
                    if (!((imp.dash >> bitPos) & 1)) activeInputs.push(i);
                }

                activeInputs.forEach((inputIdx, order) => {
                    const bx = startX + (inputIdx * 40);
                    const bitPos = inputs-1-inputIdx;
                    const val = (imp.mask >> bitPos) & 1;
                    
                    // Calcular offset vertical para separar entradas en la puerta
                    // Distribuimos los cables en la altura de la puerta (gateH)
                    const offset = (gateH / (activeInputs.length + 1)) * (order + 1);
                    const wireY = gateY + offset;

                    drawCircle(svg, bx, wireY, 3, busColors[inputIdx]);
                    drawLine(svg, bx, wireY, gateX, wireY, busColors[inputIdx]);
                    
                    if(val === 0) {
                        drawCircle(svg, gateX-10, wireY, 4, "#000"); // Inversor
                    }
                });

                // Primera Etapa
                if(currentGateType === 'nand') {
                    drawAndGate(svg, gateX, gateY, 50, gateH, true); 
                } else if (currentGateType === 'nor') {
                    drawOrGate(svg, gateX, gateY, 50, gateH, true);
                } else {
                    drawAndGate(svg, gateX, gateY, 50, gateH, false);
                }
                
                // Conexión a la etapa final (también con offset para distinguir entradas)
                const finalOffset = (300 / (implicants.length + 1)) * (idx + 1);
                const finalWireY = 100 + finalOffset;
                
                // Dibujar cable con "codo" para claridad
                const midX = gateX + 70 + (idx * 15);
                const outY = gateY + gateH/2;
                drawPath(svg, `M ${gateX + 55},${outY} H ${midX} V ${finalWireY} H ${outX}`, internalWireColor);
            });

            // Etapa Final
            if (currentGateType === 'nand') {
                drawAndGate(svg, outX, 100, 70, 300, true); // NAND Final
                drawText(svg, outX+95, 255, "F", 20);
            } else if (currentGateType === 'nor') {
                drawOrGate(svg, outX, 100, 70, 300, true); // NOR Final
                drawText(svg, outX+95, 255, "F", 20);
            } else {
                drawOrGate(svg, outX, 100, 70, 300, false); // OR Final
                drawText(svg, outX+85, 255, "F", 20);
            }
        }

        function drawLine(svg, x1, y1, x2, y2, color) {
            const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
            l.setAttribute("x1", x1); l.setAttribute("y1", y1);
            l.setAttribute("x2", x2); l.setAttribute("y2", y2);
            l.setAttribute("stroke", color);
            l.setAttribute("class", "wire");
            svg.appendChild(l);
        }
        function drawPath(svg, d, color) {
            const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
            p.setAttribute("d", d);
            p.setAttribute("stroke", color);
            p.setAttribute("class", "wire");
            svg.appendChild(p);
        }
        function drawText(svg, x, y, txt, size=12, color="#000") {
            const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
            t.setAttribute("x", x); t.setAttribute("y", y); t.setAttribute("font-weight", "black");
            t.setAttribute("font-size", size);
            t.setAttribute("fill", color);
            t.textContent = txt;
            svg.appendChild(t);
        }
        function drawCircle(svg, cx, cy, r, color) {
            const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            c.setAttribute("cx", cx); c.setAttribute("cy", cy); c.setAttribute("r", r);
            c.setAttribute("fill", color);
            svg.appendChild(c);
        }
        function drawAndGate(svg, x, y, w, h, isNand) {
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            const d = `M ${x},${y} L ${x+w/2},${y} A ${w/2},${h/2} 0 0 1 ${x+w/2},${y+h} L ${x},${y+h} Z`;
            path.setAttribute("d", d); path.setAttribute("class", "ansi-gate");
            svg.appendChild(path);
            if(isNand) {
                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                c.setAttribute("cx", x+w+6); c.setAttribute("cy", y+h/2); c.setAttribute("r", 5);
                c.setAttribute("class", "ansi-gate");
                svg.appendChild(c);
            }
        }
        function drawOrGate(svg, x, y, w, h, isNor) {
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            const d = `M ${x},${y} Q ${x+w/3},${y+h/2} ${x},${y+h} Q ${x+w},${y+h/2} ${x},${y} Z`;
            path.setAttribute("d", d); path.setAttribute("class", "ansi-gate");
            svg.appendChild(path);
            if(isNor) {
                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                c.setAttribute("cx", x+w+6); c.setAttribute("cy", y+h/2); c.setAttribute("r", 5);
                c.setAttribute("class", "ansi-gate");
                svg.appendChild(c);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
